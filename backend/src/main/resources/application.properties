server.port=8080
spring.application.name=dcvs-backend

# ── PostgreSQL Database ─────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/dcvs
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
